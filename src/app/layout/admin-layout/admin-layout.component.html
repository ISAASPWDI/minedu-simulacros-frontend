<p-toast />
<p-confirmDialog />

<div class="layout-wrapper">
  <aside class="layout-sidebar" [class.open]="sidebarOpen()">
    <div class="sidebar-brand">
      <span class="brand-title">Admin</span>
      <span class="brand-sub">Panel de Control</span>
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a class="nav-item" [class.active]="isActive(item.route)" (click)="navigate(item.route)">
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-details">
          <span class="user-name">{{ currentUser()?.profile?.firstName }} {{ currentUser()?.profile?.lastName }}</span>
          <span class="user-role">Administrador</span>
        </div>
      </div>
      <button pButton icon="pi pi-sign-out" severity="secondary" text (click)="logout()"></button>
    </div>
  </aside>

  <div class="layout-main">
    <header class="layout-topbar">
      <button pButton icon="pi pi-bars" severity="secondary" text class="sidebar-toggle" (click)="toggleSidebar()"></button>
      @if (navHistory.canGoBack()) {
        <button pButton icon="pi pi-arrow-left" severity="secondary" text class="back-btn" pTooltip="Volver" (click)="goBack()"></button>
      }
      <div class="topbar-brand">Panel Administrativo</div>
      <div class="topbar-spacer"></div>
      <div class="topbar-user">
        <span class="topbar-username">{{ currentUser()?.profile?.firstName }}</span>
      </div>
    </header>

    <main class="layout-content">
      <router-outlet />
    </main>
  </div>
</div>

@if (sidebarOpen()) {
  <div class="sidebar-overlay" (click)="toggleSidebar()"></div>
}
