<p-toast />
<p-confirmDialog />
<app-page-header title="Gestión de Usuarios" [breadcrumb]="['Admin', 'Usuarios']" />

<div class="toolbar mb-3">
  <button pButton label="Nuevo Usuario" icon="pi pi-plus" (click)="openCreate()"></button>
</div>

<div class="users-card">
  <p-table
    [value]="users()"
    [loading]="loading()"
    [tableStyle]="{'min-width': '700px'}"
    [paginator]="true"
    [rows]="pageSize"
    [totalRecords]="totalRecords()"
    [lazy]="true"
    (onLazyLoad)="onPageChange($event)"
    styleClass="p-datatable-sm"
    class="data-table-padding"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>DNI</th>
        <th>Rol</th>
        <th>Escala</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.profile?.firstName ?? '—' }} {{ user.profile?.lastName ?? '' }}</td>
        <td class="text-muted">{{ user.email }}</td>
        <td>{{ user.profile?.dni ?? '—' }}</td>
        <td>
          <p-tag [value]="getRoleLabel(user.role)" [severity]="getRoleSeverity(user.role)" />
        </td>
        <td>{{ user.profile?.escalaMagisterial | escala }}</td>
        <td>
          <p-tag [value]="user.isActive ? 'Activo' : 'Inactivo'" [severity]="user.isActive ? 'success' : 'secondary'" />
        </td>
        <td>
          <div class="action-row">
            <button pButton icon="pi pi-pencil" size="small" severity="info" text
              pTooltip="Editar usuario" (click)="openEditDialog(user)"></button>
            <button pButton
              [icon]="user.isActive ? 'pi pi-ban' : 'pi pi-check'"
              [severity]="user.isActive ? 'danger' : 'success'"
              size="small" text
              [loading]="toggling() === user.id"
              (click)="toggleActive(user)"
              [pTooltip]="user.isActive ? 'Desactivar' : 'Activar'"
            ></button>
            <button pButton icon="pi pi-trash" size="small" severity="danger" text
              [disabled]="isCurrentUser(user)"
              [pTooltip]="isCurrentUser(user) ? 'No puedes eliminar tu propia cuenta' : 'Eliminar usuario'"
              (click)="confirmDelete(user)"></button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center" style="padding:2rem;color:var(--text-muted)">No hay usuarios registrados</td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- Crear usuario -->
<p-dialog header="Nuevo Usuario" [visible]="showCreateDialog()" (visibleChange)="showCreateDialog.set($event)" [modal]="true" [style]="{'width':'520px'}" [closable]="!creating()">
  <div class="create-form">
    <div class="field-row">
      <div class="field">
        <label>Nombre</label>
        <input pInputText [ngModel]="newUser().firstName" (ngModelChange)="newUser.update(u => ({...u, firstName: $event}))" placeholder="Nombre" class="w-full" />
      </div>
      <div class="field">
        <label>Apellido</label>
        <input pInputText [ngModel]="newUser().lastName" (ngModelChange)="newUser.update(u => ({...u, lastName: $event}))" placeholder="Apellido" class="w-full" />
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input pInputText type="email" [ngModel]="newUser().email" (ngModelChange)="newUser.update(u => ({...u, email: $event}))" placeholder="correo@ejemplo.com" class="w-full" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input pInputText type="password" [ngModel]="newUser().password" (ngModelChange)="newUser.update(u => ({...u, password: $event}))" placeholder="Contraseña" class="w-full" />
    </div>
    <div class="field-row">
      <div class="field">
        <label>DNI</label>
        <input pInputText [ngModel]="newUser().dni" (ngModelChange)="newUser.update(u => ({...u, dni: $event}))" placeholder="12345678" maxlength="8" class="w-full" />
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input pInputText [ngModel]="newUser().phone" (ngModelChange)="newUser.update(u => ({...u, phone: $event}))" placeholder="987654321" maxlength="9" class="w-full" />
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Escala Magisterial</label>
        <p-select [ngModel]="newUser().escalaMagisterial" (ngModelChange)="newUser.update(u => ({...u, escalaMagisterial: $event}))" [options]="escalaOptions" placeholder="Selecciona tu escala" styleClass="w-full" appendTo="body" />
      </div>
      <div class="field">
        <label>Especialidad de Interés</label>
        <p-select [ngModel]="newUser().specialtyInterest" (ngModelChange)="newUser.update(u => ({...u, specialtyInterest: $event}))" [options]="specialtyOptions" placeholder="Selecciona especialidad" styleClass="w-full" appendTo="body" />
      </div>
    </div>
    <div class="field">
      <label>Rol</label>
      <p-select [ngModel]="newUser().role" (ngModelChange)="newUser.update(u => ({...u, role: $event}))" [options]="roleOptions" styleClass="w-full" appendTo="body" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" severity="secondary" text (click)="showCreateDialog.set(false)" [disabled]="creating()"></button>
    <button pButton label="Crear" icon="pi pi-check" [loading]="creating()" (click)="createUser()"></button>
  </ng-template>
</p-dialog>

<!-- Editar usuario -->
<p-dialog header="Editar Usuario" [visible]="showEditDialog()" (visibleChange)="showEditDialog.set($event)" [modal]="true" [style]="{'width':'480px'}" [closable]="!savingEdit()">
  @if (editingUser()) {
    <div style="margin-bottom:1rem;font-size:0.9rem;color:var(--text-muted)">
      {{ editingUser()!.email }}
    </div>
    <div class="create-form">
      <div class="field-row">
        <div class="field">
          <label>Nombre</label>
          <input pInputText [ngModel]="editForm().firstName" (ngModelChange)="editForm.update(f => ({...f, firstName: $event}))" placeholder="Nombre" class="w-full" />
        </div>
        <div class="field">
          <label>Apellido</label>
          <input pInputText [ngModel]="editForm().lastName" (ngModelChange)="editForm.update(f => ({...f, lastName: $event}))" placeholder="Apellido" class="w-full" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>DNI</label>
          <input pInputText [ngModel]="editForm().dni" (ngModelChange)="editForm.update(f => ({...f, dni: $event}))" placeholder="12345678" maxlength="8" class="w-full" />
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input pInputText [ngModel]="editForm().phone" (ngModelChange)="editForm.update(f => ({...f, phone: $event}))" placeholder="987654321" maxlength="9" class="w-full" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Escala Magisterial</label>
          <p-select [ngModel]="editForm().escalaMagisterial" (ngModelChange)="editForm.update(f => ({...f, escalaMagisterial: $event}))" [options]="escalaOptions" placeholder="Selecciona tu escala" styleClass="w-full" appendTo="body" />
        </div>
        <div class="field">
          <label>Especialidad de Interés</label>
          <p-select [ngModel]="editForm().specialtyInterest" (ngModelChange)="editForm.update(f => ({...f, specialtyInterest: $event}))" [options]="specialtyOptions" placeholder="Selecciona especialidad" styleClass="w-full" appendTo="body" />
        </div>
      </div>
      <div class="field">
        <label>Rol</label>
        <p-select [ngModel]="editForm().role" (ngModelChange)="editForm.update(f => ({...f, role: $event}))" [options]="roleOptions" styleClass="w-full" appendTo="body" />
      </div>
    </div>
  }
  <ng-template pTemplate="footer">
    <button pButton label="Cancelar" severity="secondary" text (click)="showEditDialog.set(false)" [disabled]="savingEdit()"></button>
    <button pButton label="Guardar" icon="pi pi-save" [loading]="savingEdit()" (click)="saveEdit()"></button>
  </ng-template>
</p-dialog>
